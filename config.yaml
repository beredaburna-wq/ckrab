# xckrab Configuration

# Text-to-Image Generation
text_to_image:
  model: "stable-diffusion-2.1"  # Options: stable-diffusion-2.1, stable-diffusion-3, flux-1-dev
  resolution: "768x512"  # width x height
  num_inference_steps: 30  # More steps = higher quality but slower
  guidance_scale: 7.5  # 1.0-20.0, higher = more adherence to prompt
  negative_prompt: "blurry, low quality, distorted"
  seed: null  # Set to integer for reproducibility, or null for random

# Image-to-Video Generation
image_to_video:
  model: "stable-video-diffusion-img2vid"
  duration: 5  # Duration in seconds
  fps: 30
  num_frames: 24
  num_inference_steps: 25
  guidance_scale: 7.5
  motion_intensity: 0.5  # 0.0-1.0

# Video output settings
video:
  codec: "libx264"  # or "libx265" for H.265
  bitrate: "8000k"
  quality: "high"  # low, medium, high

# Model settings
model:
  precision: "fp16"  # fp32 for CPU, fp16 for GPU
  device: "cpu"  # auto, cpu, cuda, mps

# Performance (for Termux/mobile)
performance:
  batch_size: 1
  memory_efficient: true
  enable_attention_slicing: true
  cpu_offload: true
  use_safetensors: true

# Input/Output
paths:
  prompt_file: "./prompts.txt"
  input_dir: "./inputs"
  output_dir: "./outputs"
  images_dir: "./generated_images"
  videos_dir: "./generated_videos"
  model_cache_dir: "./models"

# Logging
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  verbose: false